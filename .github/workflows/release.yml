name: Build & Release

# v* タグ（例: v1.1.0）を push したときだけ発火
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest  # Windows exe が必要なので Windows ランナー

    permissions:
      contents: write  # GitHub Release の作成・ファイル添付に必要

    steps:
      # ── リポジトリを取得 ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python セットアップ ───────────────────────────────────
      # 3.10+ 必須（X | Y 型ヒント構文を使用）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 依存パッケージ + PyInstaller インストール ─────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── exe ビルド（La_Byle.spec を使用） ─────────────────────
      - name: Build exe
        run: pyinstaller La_Byle.spec

      # ── GitHub Release 作成 + exe をアセットとして添付 ────────
      # generate_release_notes: true で前回タグからのコミットを自動まとめ
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/La_Byle.exe
          generate_release_notes: true
